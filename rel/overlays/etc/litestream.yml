dbs:
  - path: /rails/storage/production.sqlite3
    replicas:
      - type: s3
        bucket: "${LITESTREAM_BUCKET_NAME}"
        path: "${LITESTREAM_BUCKET_PATH}/primary"

        endpoint: ${LITESTREAM_ENDPOINT}
        access-key-id: ${LITESTREAM_ACCESS_KEY_ID}
        secret-access-key: ${LITESTREAM_SECRET_ACCESS_KEY}

        force-path-style: true
        region: auto
        retention: 168h

  - path: /rails/storage/production_cable.sqlite3
    replicas:
      - type: s3
        bucket: "${LITESTREAM_BUCKET_NAME}"
        path: "${LITESTREAM_BUCKET_PATH}/cable"

        endpoint: ${LITESTREAM_ENDPOINT}
        access-key-id: ${LITESTREAM_ACCESS_KEY_ID}
        secret-access-key: ${LITESTREAM_SECRET_ACCESS_KEY}

        force-path-style: true
        region: auto
        retention: 168h

  - path: /rails/storage/production_cache.sqlite3
    replicas:
      - type: s3
        bucket: "${LITESTREAM_BUCKET_NAME}"
        path: "${LITESTREAM_BUCKET_PATH}/cache"

        endpoint: ${LITESTREAM_ENDPOINT}
        access-key-id: ${LITESTREAM_ACCESS_KEY_ID}
        secret-access-key: ${LITESTREAM_SECRET_ACCESS_KEY}

        force-path-style: true
        region: auto
        retention: 168h

  - path: /rails/storage/production_queue.sqlite3
    replicas:
      - type: s3
        bucket: "${LITESTREAM_BUCKET_NAME}"
        path: "${LITESTREAM_BUCKET_PATH}/queue"

        endpoint: ${LITESTREAM_ENDPOINT}
        access-key-id: ${LITESTREAM_ACCESS_KEY_ID}
        secret-access-key: ${LITESTREAM_SECRET_ACCESS_KEY}

        force-path-style: true
        region: auto
        retention: 168h
